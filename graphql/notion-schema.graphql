# ---------------------------------------------------------------------------
# Shared / Primitive types
# ---------------------------------------------------------------------------

type Annotation {
  bold: Boolean!
  italic: Boolean!
  strikethrough: Boolean!
  underline: Boolean!
  code: Boolean!
  color: Color!
}

type TextContent {
  content: String!
  link: Link
}

type Link {
  url: String!
}

type EquationContent {
  expression: String!
}

type MentionUser {
  object: String!
  id: ID!
}

type MentionPage {
  id: ID!
}

type MentionDatabase {
  id: ID!
}

type MentionDate {
  start: String!
  end: String
  time_zone: String
}

type MentionLinkPreview {
  url: String!
}

type MentionTemplateMention {
  type: String!
  template_mention_date: String
  template_mention_user: String
}

union MentionContent =
    MentionUser
  | MentionPage
  | MentionDatabase
  | MentionDate
  | MentionLinkPreview
  | MentionTemplateMention

type RichText {
  type: RichTextType!
  annotations: Annotation!
  plain_text: String!
  href: String
  text: TextContent
  mention: JSON
  equation: EquationContent
}

type Emoji {
  type: String!
  emoji: String!
}

type ExternalFile {
  url: String!
}

type HostedFile {
  url: String!
