# ---------------------------------------------------------------------------
# Root types
# ---------------------------------------------------------------------------

type Query {
  # Databases
  database(id: ID!): Database
  queryDatabase(
    id: ID!
    filter: DatabaseQueryFilter
    sorts: [DatabaseQuerySort!]
    start_cursor: String
    page_size: Int
    filter_properties: [String!]
  ): PagedList

  # Pages
  page(id: ID!): Page
  pageProperty(page_id: ID!, property_id: ID!, start_cursor: String, page_size: Int): JSON

  # Blocks
  block(id: ID!): Block
  blockChildren(block_id: ID!, start_cursor: String, page_size: Int): BlockList

  # Users
  user(id: ID!): User
  users(start_cursor: String, page_size: Int): UserList
  me: User

  # Comments
  comments(block_id: ID, discussion_id: ID, start_cursor: String, page_size: Int): CommentList

  # Search
  search(
    query: String
    filter: SearchFilter
    sort: SearchSort
    start_cursor: String
    page_size: Int
  ): SearchResult

  # File Uploads
  fileUpload(id: ID!): FileUpload
  fileUploads(start_cursor: String, page_size: Int): FileUploadList

  # Data Sources
  dataSource(id: ID!): DataSource
  dataSourceTemplates: JSON
  queryDataSource(id: ID!, filter: JSON, sorts: [JSON!], start_cursor: String, page_size: Int): PagedList

  # Token introspection
  introspectToken: TokenIntrospection
}

type Mutation {
  # Databases
  createDatabase(input: CreateDatabaseInput!): Database
  updateDatabase(id: ID!, input: UpdateDatabaseInput!): Database

  # Pages
  createPage(input: CreatePageInput!): Page
  updatePage(id: ID!, input: UpdatePageInput!): Page
  archivePage(id: ID!): Page
  movePage(id: ID!, parent: ParentInput!): Page

  # Blocks
  updateBlock(id: ID!, block: BlockInput!): Block
  deleteBlock(id: ID!): Block
  appendBlockChildren(block_id: ID!, children: [BlockInput!]!, after: ID): BlockList

  # Comments
  createComment(input: CreateCommentInput!): Comment

  # File Uploads
  createFileUpload(filename: String!, content_type: String!, content_length: Int, number_of_parts: Int): FileUpload
  completeFileUpload(id: ID!, parts: [JSON!]): FileUpload

  # Data Sources
  createDataSource(input: JSON!): DataSource
  updateDataSource(id: ID!, input: JSON!): DataSource

  # Token management
  createToken(code: String!, grant_type: String!, redirect_uri: String): Token
  refreshToken(grant_type: String!, refresh_token: String!): Token
  revokeToken(token: String!): JSON
}
