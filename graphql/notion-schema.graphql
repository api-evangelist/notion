# Notion API — Conceptual GraphQL Schema
# Derived from the Notion REST API (https://developers.notion.com/reference/intro)
# Notion does not expose a native GraphQL endpoint.
# This schema is a comprehensive data model for tooling, catalog enrichment,
# code generation, and integration mapping.
# REST base URL: https://api.notion.com/v1

scalar DateTime
scalar JSON

