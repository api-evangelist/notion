          value: $.
    - name: users-me
      path: /users/me
      operations:
      - name: retrievebotuser
        method: GET
        description: Notion Retrieve the bot user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      operations:
      - name: search
        method: POST
        description: Notion Search by title
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: comments
      path: /comments
      operations:
      - name: listcomments
        method: GET
        description: Notion Retrieve comments
        inputParameters:
        - name: block_id
          in: query
          type: string
          required: true
          description: The ID of the block or page to retrieve comments for.
        - name: start_cursor
          in: query
          type: string
          description: Pagination cursor to continue fetching results.
        - name: page_size
          in: query
          type: integer
          description: Maximum number of comments to return (max 100).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcomment
        method: POST
        description: Notion Create a comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
