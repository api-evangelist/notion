naftiko: 1.0.0-alpha2
info:
  label: Notion API
  description: The Notion API allows developers to integrate with Notion workspaces programmatically. Build integrations that
    connect Notion with other tools, automate workflows, and manage workspace content including pages, databases, blocks,
    users, comments, and search. Notion is an all-in-one workspace that combines notes, tasks, wikis, and databases into a
    flexible, collaborative platform.
  tags:
  - Notion
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: notion
    baseUri: https://api.notion.com/v1
    description: Notion API HTTP API.
    authentication:
      type: bearer
      token: '{{NOTION_TOKEN}}'
    resources:
    - name: pages
      path: /pages
      operations:
      - name: createpage
        method: POST
        description: Notion Create a page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pages-page-id
      path: /pages/{page_id}
      operations:
      - name: retrievepage
        method: GET
        description: Notion Retrieve a page
        inputParameters:
        - name: page_id
          in: path
          type: string
          required: true
          description: The ID of the page to retrieve.
        - name: filter_properties
          in: query
          type: array
          description: A list of page property value IDs to include in the response. If provided, only the specified properties
            will be returned.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatepage
        method: PATCH
        description: Notion Update page properties
        inputParameters:
        - name: page_id
          in: path
          type: string
          required: true
          description: The ID of the page to update.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pages-page-id-properties-property-id
      path: /pages/{page_id}/properties/{property_id}
      operations:
      - name: retrievepageproperty
        method: GET
        description: Notion Retrieve a page property item
        inputParameters:
        - name: page_id
          in: path
          type: string
          required: true
          description: The ID of the page.
        - name: property_id
          in: path
          type: string
          required: true
          description: The ID of the property to retrieve.
        - name: start_cursor
          in: query
          type: string
          description: Pagination cursor for paginated property types. If supplied, returns results starting after the cursor.
        - name: page_size
          in: query
          type: integer
          description: Maximum number of property items to return (max 100).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: databases
      path: /databases
      operations:
      - name: createdatabase
        method: POST
        description: Notion Create a database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: databases-database-id
      path: /databases/{database_id}
      operations:
      - name: retrievedatabase
        method: GET
        description: Notion Retrieve a database
        inputParameters:
        - name: database_id
          in: path
          type: string
          required: true
          description: The ID of the database to retrieve.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatedatabase
        method: PATCH
        description: Notion Update a database
        inputParameters:
        - name: database_id
          in: path
          type: string
          required: true
          description: The ID of the database to update.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: databases-database-id-query
      path: /databases/{database_id}/query
      operations:
      - name: querydatabase
        method: POST
        description: Notion Query a database
        inputParameters:
        - name: database_id
          in: path
          type: string
          required: true
          description: The ID of the database to query.
        - name: filter_properties
          in: query
          type: array
          description: A list of property IDs to include in the response. Only the specified properties will be returned for
            each page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: blocks-block-id
      path: /blocks/{block_id}
      operations:
      - name: retrieveblock
        method: GET
        description: Notion Retrieve a block
        inputParameters:
        - name: block_id
          in: path
          type: string
          required: true
          description: The ID of the block to retrieve.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateblock
        method: PATCH
        description: Notion Update a block
        inputParameters:
        - name: block_id
          in: path
          type: string
          required: true
          description: The ID of the block to update.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteblock
        method: DELETE
        description: Notion Delete a block
        inputParameters:
        - name: block_id
          in: path
          type: string
          required: true
          description: The ID of the block to delete (archive).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: blocks-block-id-children
      path: /blocks/{block_id}/children
      operations:
      - name: retrieveblockchildren
        method: GET
        description: Notion Retrieve block children
        inputParameters:
        - name: block_id
          in: path
          type: string
          required: true
          description: The ID of the block whose children to retrieve. This can be a page ID to retrieve page content.
        - name: start_cursor
          in: query
          type: string
          description: Pagination cursor to continue fetching results.
        - name: page_size
          in: query
          type: integer
          description: Maximum number of blocks to return (max 100).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: appendblockchildren
        method: PATCH
        description: Notion Append block children
        inputParameters:
        - name: block_id
          in: path
          type: string
          required: true
          description: The ID of the block to append children to. This can be a page ID to add content to a page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: Notion List all users
        inputParameters:
        - name: start_cursor
          in: query
          type: string
          description: Pagination cursor to continue fetching results.
        - name: page_size
          in: query
          type: integer
          description: Maximum number of users to return (max 100).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-user-id
