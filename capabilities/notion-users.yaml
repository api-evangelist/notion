naftiko: 1.0.0-alpha2
info:
  label: Notion API — Users
  description: 'Notion API — Users. 3 operations. Lead operation: Notion List all users. Self-contained Naftiko capability
    covering one Notion business surface.'
  tags:
  - Notion
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NOTION_API_KEY: NOTION_API_KEY
capability:
  consumes:
  - type: http
    namespace: notion-users
    baseUri: https://api.notion.com/v1
    description: Notion API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: Notion List all users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_cursor
          in: query
          type: string
          description: Pagination cursor to continue fetching results.
        - name: page_size
          in: query
          type: integer
          description: Maximum number of users to return (max 100).
    - name: users-me
      path: /users/me
      operations:
      - name: retrievebotuser
        method: GET
        description: Notion Retrieve the bot user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-user_id
      path: /users/{user_id}
      operations:
      - name: retrieveuser
        method: GET
        description: Notion Retrieve a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: The ID of the user to retrieve.
          required: true
    authentication:
      type: bearer
      token: '{{env.NOTION_API_KEY}}'
  exposes:
  - type: rest
    namespace: notion-users-rest
    port: 8080
    description: REST adapter for Notion API — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: Notion List all users
        call: notion-users.listusers
        with:
          start_cursor: rest.start_cursor
          page_size: rest.page_size
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/me
      name: users-me
      description: REST surface for users-me.
      operations:
      - method: GET
        name: retrievebotuser
        description: Notion Retrieve the bot user
        call: notion-users.retrievebotuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{user-id}
      name: users-user-id
      description: REST surface for users-user_id.
      operations:
      - method: GET
        name: retrieveuser
        description: Notion Retrieve a user
        call: notion-users.retrieveuser
        with:
          user_id: rest.user_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: notion-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Notion API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: notion-list-all-users
      description: Notion List all users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: notion-users.listusers
      with:
        start_cursor: tools.start_cursor
        page_size: tools.page_size
      outputParameters:
      - type: object
        mapping: $.
    - name: notion-retrieve-bot-user
      description: Notion Retrieve the bot user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: notion-users.retrievebotuser
      outputParameters:
      - type: object
        mapping: $.
    - name: notion-retrieve-user
      description: Notion Retrieve a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: notion-users.retrieveuser
      with:
        user_id: tools.user_id
      outputParameters:
      - type: object
        mapping: $.
